# Project name
name: 'ecommerce_project'
version: '1.0.0'

# Profile name (must match profiles.yml)
profile: 'ecommerce_project'

# Paths
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Clean folders
clean-targets:
  - "target"
  - "dbt_packages"

# Model configurations
models:
  ecommerce_project:

    # 🔹 STAGING LAYER (raw → cleaned)
    staging:
      +materialized: view
      +schema: staging

    # 🔹 INTERMEDIATE LAYER (joins, transformations)
    intermediate:
      +materialized: view
      +schema: intermediate

    # 🔹 MART LAYER (final business tables)
    marts:
      +materialized: view
      +schema: marts